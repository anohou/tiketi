version: '3.8'

services:
  app:
    image: ${DOCKER_IMAGE_NAME:-ghcr.io/anohou/billeterie:staging}
    container_name: dc_billeterie_staging

    volumes:
      # Bind mount entire project for code updates without rebuild
      - type: bind
        source: ../../
        target: /var/www/html

    environment:
      - APP_ENV=staging
      - CONTAINER_ROLE=app
      - APP_TYPE=fullstack
      - ASSET_URL=https://stg-billeterie.anohou.dev

    networks:
      - traefik_swarm_network

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_swarm_network"

      # Central domain routing (landlord)
      - "traefik.http.routers.billeterie-staging.rule=Host(`stg-billeterie.anohou.dev`)"
      - "traefik.http.routers.billeterie-staging.entrypoints=websecure"
      - "traefik.http.routers.billeterie-staging.tls=true"
      - "traefik.http.routers.billeterie-staging.tls.certresolver=letsencrypt"
      - "traefik.http.routers.billeterie-staging.service=billeterie-staging-service"

      # Wildcard tenant subdomain routing
      - "traefik.http.routers.billeterie-staging-tenants.rule=HostRegexp(`^[a-z0-9-]+\\\\.stg-billeterie\\\\.anohou\\\\.dev$`)"
      - "traefik.http.routers.billeterie-staging-tenants.entrypoints=websecure"
      - "traefik.http.routers.billeterie-staging-tenants.tls=true"
      - "traefik.http.routers.billeterie-staging-tenants.tls.certresolver=letsencrypt"
      - "traefik.http.routers.billeterie-staging-tenants.service=billeterie-staging-service"

      # Service configuration (shared by both routers)
      - "traefik.http.services.billeterie-staging-service.loadbalancer.server.port=9000"

    restart: unless-stopped

networks:
  traefik_swarm_network:
    external: true
