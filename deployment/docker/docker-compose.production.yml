services:
    app:
        image: ${DOCKER_IMAGE_NAME:-ghcr.io/anohou/tiketi:production}
        container_name: dc_tiketi_production
        restart: unless-stopped
        networks:
            - traefik_swarm_network
        environment:
            - APP_ENV=production
            - CONTAINER_ROLE=app
            - APP_TYPE=fullstack
        volumes:
            # Bind mount entire project
            - type: bind
              source: ../../
              target: /var/www/html
        labels:
            - "traefik.enable=true"
            - "traefik.docker.network=traefik_swarm_network"


            # HTTP Service
            - "traefik.http.services.tiketi-production-http-service.loadbalancer.server.port=9000"

            # Dynamic routing configuration (path-based or domain-based)
            - "traefik.http.routers.tiketi-production.rule=Host(`tiketi.anohou.dev`)"

            # HTTP to HTTPS Redirect Router (if path-based, includes path)
            - "traefik.http.routers.tiketi-production-http-insecure.entrypoints=web"
            - "traefik.http.routers.tiketi-production-http-insecure.middlewares=tiketi-production-https-redirect"

            # Service-specific middleware for X-Forwarded-Host
            - "traefik.http.middlewares.tiketi-production-forwarded-host.headers.customrequestheaders.X-Forwarded-Host=tiketi.anohou.dev"

            # Main HTTPS Router configuration
            - "traefik.http.routers.tiketi-production-http.entrypoints=websecure"
            - "traefik.http.routers.tiketi-production-http.tls=true"
            - "traefik.http.routers.tiketi-production-http.tls.certresolver=cloudflare"
            - "traefik.http.routers.tiketi-production-http.service=tiketi-production-http-service"
            - "traefik.http.routers.tiketi-production-http.middlewares=secure-headers,tiketi-production-forwarded-host"

            # HTTPS Redirect Middleware
            - "traefik.http.middlewares.tiketi-production-https-redirect.redirectscheme.scheme=https"

            # Wildcard tenant subdomain routing (using DNS challenge for wildcard certificate)
            - "traefik.http.routers.tiketi-production-tenants.rule=HostRegexp(`^[a-z0-9-]+\\.tiketi\\.anohou\\.dev$$`)"
            - "traefik.http.routers.tiketi-production-tenants.entrypoints=websecure"
            - "traefik.http.routers.tiketi-production-tenants.tls=true"
            - "traefik.http.routers.tiketi-production-tenants.tls.certresolver=cloudflare"
            - "traefik.http.routers.tiketi-production-tenants.tls.domains[0].main=tiketi.anohou.dev"
            - "traefik.http.routers.tiketi-production-tenants.tls.domains[0].sans=*.tiketi.anohou.dev"
            - "traefik.http.routers.tiketi-production-tenants.service=tiketi-production-http-service"

networks:
    traefik_swarm_network:
        external: true
        name: traefik_swarm_network
