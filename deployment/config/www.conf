; ╔══════════════════════════════════════════════════════════════════════════════╗
; ║  PHP-FPM pool configuration — production                                   ║
; ╚══════════════════════════════════════════════════════════════════════════════╝

[www]
; Run as non-root appuser
user  = appuser
group = appgroup

listen = 0.0.0.0:9000
listen.owner = appuser
listen.group = appgroup
listen.mode  = 0660

; ── Process management ────────────────────────────────────────────────────────
pm                    = dynamic
pm.max_children       = 20
pm.start_servers      = 4
pm.min_spare_servers  = 2
pm.max_spare_servers  = 8
pm.max_requests       = 500

; ── Timeouts ─────────────────────────────────────────────────────────────────
request_terminate_timeout = 120s

; ── Health Check ─────────────────────────────────────────────────────────────
ping.path = /ping

; ── Logging ───────────────────────────────────────────────────────────────────
; Send access log to stdout (captured by Docker)
access.log     = /proc/self/fd/2
access.format  = "%R - %u %t \"%m %r\" %s %f %{mili}d ms mem=%{kilo}M"

; Error log to stderr
php_admin_value[error_log]      = /proc/self/fd/2
php_admin_flag[log_errors]      = on

; ── Security ──────────────────────────────────────────────────────────────────
; Restrict PHP to the app directory
php_admin_value[open_basedir]   = /var/www/html:/tmp
php_admin_value[upload_tmp_dir] = /tmp

; ── Environment passthrough ───────────────────────────────────────────────────
; Forward all env vars from the container to PHP
clear_env = no
