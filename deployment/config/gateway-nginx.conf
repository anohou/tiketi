# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  gateway-nginx.conf — Internal mTLS backend gateway                        ║
# ║  Used when gateway.mode=mtls_gateway                                       ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

worker_processes auto;
pid /tmp/nginx-gateway.pid;

error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'mtls_verify=$ssl_client_verify mtls_dn="$ssl_client_s_dn"';

    access_log /dev/stdout main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 50M;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    server {
        listen 8080 ssl http2;
        server_name tiketi-nginx;

        root /var/www/html/public;
        index index.php index.html;

        ssl_certificate /etc/nginx/mtls/server.crt;
        ssl_certificate_key /etc/nginx/mtls/server.key;
        ssl_client_certificate /etc/nginx/mtls/ca.crt;
        ssl_verify_client on;
        ssl_verify_depth 1;
        ssl_protocols TLSv1.3 TLSv1.2;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass php-fpm:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_param SSL_CLIENT_VERIFY $ssl_client_verify;
            fastcgi_param SSL_CLIENT_S_DN $ssl_client_s_dn;
            fastcgi_param SSL_CLIENT_I_DN $ssl_client_i_dn;
            fastcgi_param SSL_CLIENT_SERIAL $ssl_client_serial;
            include fastcgi_params;
            fastcgi_read_timeout 300;
            fastcgi_send_timeout 300;
            fastcgi_connect_timeout 60;
        }

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    server {
        listen 127.0.0.1:8081;
        server_name localhost;

        root /var/www/html/public;

        location /health {
            access_log off;
            include fastcgi_params;
            fastcgi_pass php-fpm:9000;
            fastcgi_param SCRIPT_FILENAME $document_root/index.php;
            fastcgi_param SSL_CLIENT_VERIFY "NONE";
            fastcgi_param SSL_CLIENT_S_DN "";
        }
    }

    server {
        listen 8082;
        server_name _;

        root /var/www/html/public;
        index index.php index.html;

        location /provider-hooks/ {
            limit_except POST {
                deny all;
            }
            try_files $uri @webhook_front_controller;
        }

        location @webhook_front_controller {
            include fastcgi_params;
            fastcgi_pass php-fpm:9000;
            fastcgi_param SCRIPT_FILENAME $document_root/index.php;
            fastcgi_param REQUEST_URI $request_uri;
            fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
            fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
            fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
            fastcgi_param SSL_CLIENT_VERIFY "NONE";
            fastcgi_param SSL_CLIENT_S_DN "";
            fastcgi_read_timeout 30s;
            fastcgi_send_timeout 30s;
            fastcgi_connect_timeout 5s;
        }

        location ~ \.php$ {
            return 404;
        }

        location / {
            return 404;
        }
    }
}
