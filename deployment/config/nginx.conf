# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  nginx.conf — Production nginx configuration                                ║
# ║  Hardened, security headers, Filament/Livewire aware, rate limiting        ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

worker_processes  auto;
pid    /tmp/nginx.pid;

error_log  /dev/stderr warn;

events {
    worker_connections  1024;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    map $remote_addr $is_local_deploy_request {
        default 0;
        127.0.0.1 1;
        ::1 1;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main_json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"user_agent":"$http_user_agent",'
            '"x_forwarded_for":"$http_x_forwarded_for"'
        '}';

    access_log /dev/stdout main_json;
    error_log  /dev/stderr warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # ── Security ──────────────────────────────────────────────────────────────
    server_tokens          off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=web:10m rate=120r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_status 429;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript;

    # ── Server ────────────────────────────────────────────────────────────────
    server {
        listen 8080;
        server_name _;
        root /var/www/html/public;
        index index.php;
        set $deploy_color "single";
        set $deployment_gate_state open;
        if (!-f /var/www/html/storage/framework/deploy/ready) {
            set $deployment_gate_state closed;
        }
        if ($is_local_deploy_request = 1) {
            set $deployment_gate_state open;
        }
        if ($request_uri = /up) {
            set $deployment_gate_state open;
        }
        if ($request_uri = /readyz) {
            set $deployment_gate_state open;
        }
        if ($deployment_gate_state = closed) {
            return 503;
        }

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Frame-Options            "SAMEORIGIN"                        always;
        add_header X-Content-Type-Options     "nosniff"                           always;
        add_header X-XSS-Protection           "1; mode=block"                     always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
        # NOTE: CSP is permissive for Filament (Alpine.js + inline scripts/styles).
        #       FilePond / Filament uploads also need blob workers in admin forms.
        #       Cloudflare Turnstile is permitted for login spam protection.
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com https://static.cloudflareinsights.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.bunny.net; img-src 'self' data: blob: https://ui-avatars.com; connect-src 'self' wss: https://cloudflareinsights.com; font-src 'self' data: https://fonts.bunny.net; frame-src 'self' https://challenges.cloudflare.com;" always;
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
        add_header X-Deploy-Color             "$deploy_color" always;

        # ── Public uploads ───────────────────────────────────────────────────
        # Serve Laravel's public disk directly from the mounted storage path.
        # This avoids routing uploaded file previews through generic app rules.
        location ^~ /storage/ {
            alias       /var/www/html/storage/app/public/;
            expires     1y;
            add_header  Cache-Control "public, immutable";
            add_header  X-Deploy-Color "$deploy_color" always;
            access_log  off;
        }

        # ── Static assets (long cache) ────────────────────────────────────────
        location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|ttf|eot|otf|webp|avif)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
            add_header  X-Deploy-Color "$deploy_color" always;
            access_log  off;
            try_files   $uri $uri/ /index.php?$query_string;
        }

        # ── Fast liveness probe (served entirely by nginx) ────────────────────
        location = /up {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        # ── Readiness probe (gated on deployment promotion marker) ────────────
        location = /readyz {
            access_log off;
            default_type text/plain;

            if (-f /var/www/html/storage/framework/deploy/ready) {
                return 200 "ready\n";
            }

            return 503 "not ready\n";
        }

        # ── Auth endpoints (strict rate limit) ────────────────────────────────
        location ~ ^/(login|register|forgot-password|password-reset)$ {
            limit_req zone=auth burst=5 nodelay;
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ ^/admin/login$ {
            limit_req zone=auth burst=5 nodelay;
            try_files $uri $uri/ /index.php?$query_string;
        }

        # ── Livewire (real-time updates) — higher burst allowed ───────────────
        location /livewire/ {
            limit_req zone=web burst=60 nodelay;
            try_files $uri $uri/ /index.php?$query_string;
        }

        # ── General web routes ────────────────────────────────────────────────
        location / {
            limit_req zone=web burst=40 nodelay;
            try_files $uri $uri/ /index.php?$query_string;
        }

        # ── PHP-FPM ───────────────────────────────────────────────────────────
        location ~ \.php$ {
            fastcgi_pass          php-fpm:9000;
            fastcgi_index         index.php;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_param         SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param         PATH_INFO $fastcgi_path_info;
            include               fastcgi_params;
            fastcgi_read_timeout  120;
            fastcgi_buffer_size   16k;
            fastcgi_buffers       4 16k;
        }

        # ── Block hidden files ────────────────────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── Block sensitive files ─────────────────────────────────────────────
        location ~* \.(env|log|sql|bak|sh|key)$ {
            deny all;
        }
    }
}
